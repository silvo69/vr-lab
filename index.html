<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jabir's Alchemy Lab — WebXR</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
  #info {
    position: absolute; top: 12px; left: 12px; color: #fff;
    background: rgba(0,0,0,0.5); padding: 10px 14px; border-radius: 8px;
    max-width: 360px; font-size: 14px; z-index: 10;
  }
  #enterBtn {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 14px 28px; font-size: 18px; background: #b8860b; color: #fff;
    border: none; border-radius: 8px; cursor: pointer; z-index: 10;
  }
  #enterBtn:hover { background: #daa520; }
</style>
</head>
<body>
<div id="info">
  <b>Jabir ibn Hayyan's Laboratory</b><br/>
  Put on your Quest 2 and tap "Enter VR". Use the <b>trigger</b> to grab objects and to point at the glowing station orbs to start experiments.
</div>

<script type="importmap">
{
  "imports": {
    "three": "[unpkg.com](https://unpkg.com/three@0.160.0/build/three.module.js)",
    "three/addons/": "[unpkg.com](https://unpkg.com/three@0.160.0/examples/jsm/)"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ---------- Scene setup ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0f08);
scene.fog = new THREE.Fog(0x1a0f08, 6, 18);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Lighting ----------
scene.add(new THREE.AmbientLight(0x6a4a2a, 0.45));

const moonLight = new THREE.DirectionalLight(0xfff1c4, 0.35);
moonLight.position.set(5, 10, 4);
scene.add(moonLight);

// Warm lantern lights
function addLantern(x, y, z) {
  const lantern = new THREE.Group();
  const cage = new THREE.Mesh(
    new THREE.SphereGeometry(0.09, 12, 12),
    new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0xff8800, emissiveIntensity: 1.5 })
  );
  lantern.add(cage);
  const chain = new THREE.Mesh(
    new THREE.CylinderGeometry(0.005, 0.005, 0.6),
    new THREE.MeshStandardMaterial({ color: 0x222 })
  );
  chain.position.y = 0.35; lantern.add(chain);
  const light = new THREE.PointLight(0xffaa55, 1.2, 6, 2);
  light.position.y = 0; lantern.add(light);
  lantern.position.set(x, y, z);
  scene.add(lantern);
  return lantern;
}
addLantern(-2, 2.4, -2);
addLantern( 2, 2.4, -2);
addLantern( 0, 2.4,  1.5);

// ---------- Materials ----------
const stoneMat = new THREE.MeshStandardMaterial({ color: 0x7a6850, roughness: 0.95 });
const woodMat  = new THREE.MeshStandardMaterial({ color: 0x4a2c14, roughness: 0.8 });
const tileMat  = new THREE.MeshStandardMaterial({ color: 0x3a2a1c, roughness: 0.7 });
const brassMat = new THREE.MeshStandardMaterial({ color: 0xb8860b, metalness: 0.8, roughness: 0.3 });

// ---------- Room ----------
const ROOM = 6;
const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM, ROOM), tileMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(ROOM, ROOM), stoneMat);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 3;
scene.add(ceiling);

function makeWall(w, h, x, y, z, ry=0) {
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), stoneMat);
  wall.position.set(x, y, z);
  wall.rotation.y = ry;
  wall.receiveShadow = true;
  scene.add(wall);
}
makeWall(ROOM, 3, 0, 1.5, -ROOM/2);
makeWall(ROOM, 3, 0, 1.5,  ROOM/2, Math.PI);
makeWall(ROOM, 3, -ROOM/2, 1.5, 0, Math.PI/2);
makeWall(ROOM, 3,  ROOM/2, 1.5, 0, -Math.PI/2);

// Decorative arches on back wall
for (let i = -1; i <= 1; i++) {
  const arch = new THREE.Mesh(
    new THREE.TorusGeometry(0.4, 0.04, 8, 24, Math.PI),
    brassMat
  );
  arch.position.set(i * 1.5, 2.0, -ROOM/2 + 0.02);
  scene.add(arch);
}

// ---------- Workbench ----------
const bench = new THREE.Group();
const top = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.08, 0.8), woodMat);
top.position.y = 0.85; top.castShadow = true; top.receiveShadow = true;
bench.add(top);
for (const x of [-1.1, 1.1]) for (const z of [-0.35, 0.35]) {
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.85, 0.08), woodMat);
  leg.position.set(x, 0.425, z); leg.castShadow = true;
  bench.add(leg);
}
bench.position.set(0, 0, -1.2);
scene.add(bench);

// Shelves with bottles
function addShelf(x, y, z) {
  const shelf = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.04, 0.3), woodMat);
  shelf.position.set(x, y, z); shelf.castShadow = true;
  scene.add(shelf);
  for (let i = 0; i < 5; i++) {
    const colors = [0x4488ff, 0x44ff88, 0xff4488, 0xffcc44, 0xaa44ff];
    const bottle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.06, 0.18, 12),
      new THREE.MeshPhysicalMaterial({
        color: colors[i], transmission: 0.6, roughness: 0.1,
        thickness: 0.3, emissive: colors[i], emissiveIntensity: 0.15
      })
    );
    bottle.position.set(x - 0.6 + i * 0.3, y + 0.11, z);
    scene.add(bottle);
  }
}
addShelf(-2.2, 1.4, -2.85);
addShelf( 2.2, 1.4, -2.85);
addShelf(-2.2, 2.0, -2.85);
addShelf( 2.2, 2.0, -2.85);

// ---------- Furnace ----------
const furnace = new THREE.Group();
const base = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.5, 0.9, 16), stoneMat);
base.position.y = 0.45; base.castShadow = true;
furnace.add(base);
const opening = new THREE.Mesh(
  new THREE.BoxGeometry(0.4, 0.3, 0.05),
  new THREE.MeshStandardMaterial({ color: 0x000, emissive: 0xff4400, emissiveIntensity: 1.2 })
);
opening.position.set(0, 0.45, 0.46);
furnace.add(opening);
const fireLight = new THREE.PointLight(0xff5522, 2.5, 4, 2);
fireLight.position.set(0, 0.5, 0.6);
furnace.add(fireLight);

// Animated flame
const flameGeo = new THREE.ConeGeometry(0.15, 0.4, 8);
const flameMat = new THREE.MeshBasicMaterial({ color: 0xff7722, transparent: true, opacity: 0.85 });
const flame = new THREE.Mesh(flameGeo, flameMat);
flame.position.set(0, 1.0, 0);
furnace.add(flame);

furnace.position.set(-2, 0, -1.2);
scene.add(furnace);

// ---------- Interactive objects ----------
const interactables = [];
const grabbables = [];

// Helper: glass material
function glass(color) {
  return new THREE.MeshPhysicalMaterial({
    color, transmission: 0.85, roughness: 0.05, thickness: 0.3,
    transparent: true, opacity: 0.55, ior: 1.45
  });
}

// Grabbable flask
function makeFlask(x, z, liquidColor=0x55aaff) {
  const group = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), glass(0xffffff));
  body.position.y = 0.08; group.add(body);
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.12), glass(0xffffff));
  neck.position.y = 0.2; group.add(neck);
  const liquid = new THREE.Mesh(
    new THREE.SphereGeometry(0.07, 16, 16),
    new THREE.MeshStandardMaterial({ color: liquidColor, transparent: true, opacity: 0.85 })
  );
  liquid.position.y = 0.08; liquid.scale.y = 0.7;
  group.add(liquid);
  group.userData.liquid = liquid;
  group.userData.grabbable = true;
  group.position.set(x, 0.89, z);
  scene.add(group);
  grabbables.push(group);
  return group;
}

const flaskA = makeFlask(-0.4, -1.2, 0x33ccff);
const flaskB = makeFlask( 0.4, -1.2, 0xffcc33);
const flaskC = makeFlask( 0.0, -1.0, 0x88ff88);

// Station activator orbs (point + trigger to start an experiment)
function makeStation(x, y, z, color, label, onActivate) {
  const orb = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 16, 16),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.8 })
  );
  orb.position.set(x, y, z);
  orb.userData.activate = onActivate;
  orb.userData.label = label;
  scene.add(orb);
  interactables.push(orb);
  return orb;
}

// ---------- Experiment 1: Distillation (Al-Anbiq) ----------
const stillGroup = new THREE.Group();
const cucurbit = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), glass(0xffffff));
cucurbit.position.set(0, 0.97, 0);
stillGroup.add(cucurbit);
const alembicHead = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.18, 16), glass(0xffffff));
alembicHead.position.set(0, 1.18, 0);
stillGroup.add(alembicHead);
const spout = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.3), glass(0xffffff));
spout.position.set(0.18, 1.15, 0);
spout.rotation.z = -Math.PI/2.5;
stillGroup.add(spout);
const receiver = new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 16), glass(0xffffff));
receiver.position.set(0.36, 0.95, 0);
stillGroup.add(receiver);
stillGroup.position.set(1.2, 0, -1.2);
scene.add(stillGroup);

const vaporParticles = [];
let distilling = false;
function startDistillation() {
  distilling = true;
  setTimeout(() => distilling = false, 12000);
}
makeStation(1.2, 1.45, -1.2, 0x66ddff, "Distillation", startDistillation);

// ---------- Experiment 2: Calcination ----------
let calcining = false;
const crucible = new THREE.Mesh(
  new THREE.CylinderGeometry(0.08, 0.06, 0.08, 12),
  new THREE.MeshStandardMaterial({ color: 0x553322, roughness: 0.9 })
);
crucible.position.set(-2, 0.95, -1.2);
scene.add(crucible);
const substance = new THREE.Mesh(
  new THREE.SphereGeometry(0.05, 12, 12),
  new THREE.MeshStandardMaterial({ color: 0x88ff88 })
);
substance.position.set(-2, 0.99, -1.2);
scene.add(substance);

function startCalcination() {
  calcining = true;
  let t = 0;
  const interval = setInterval(() => {
    t += 0.1;
    const c = new THREE.Color().lerpColors(
      new THREE.Color(0x88ff88), new THREE.Color(0xffffff), Math.min(t, 1)
    );
    substance.material.color = c;
    substance.material.emissive = new THREE.Color(0xff3300);
    substance.material.emissiveIntensity = Math.min(t, 1) * 0.8;
    if (t >= 1.5) { clearInterval(interval); calcining = false; }
  }, 200);
}
makeStation(-2, 1.3, -1.2, 0xff8844, "Calcination", startCalcination);

// ---------- Experiment 3: Color-change reaction ----------
const beaker = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.18, 16, 1, true), glass(0xffffff));
beaker.position.set(0, 0.94, -1.2);
scene.add(beaker);
const mixture = new THREE.Mesh(
  new THREE.CylinderGeometry(0.085, 0.085, 0.14, 16),
  new THREE.MeshStandardMaterial({ color: 0x4488ff, transparent: true, opacity: 0.85 })
);
mixture.position.set(0, 0.92, -1.2);
scene.add(mixture);

function startReaction() {
  let t = 0;
  const interval = setInterval(() => {
    t += 0.05;
    const c = new THREE.Color().setHSL((t * 0.7) % 1, 0.9, 0.5);
    mixture.material.color = c;
    mixture.scale.y = 1 + Math.sin(t * 8) * 0.05;
    if (t >= 4) clearInterval(interval);
  }, 100);
}
makeStation(0, 1.25, -1.2, 0xff44aa, "Reaction", startReaction);

// ---------- Controllers ----------
const controllerModelFactory = new XRControllerModelFactory();
const controllers = [];
const heldObjects = [null, null];

for (let i = 0; i < 2; i++) {
  const controller = renderer.xr.getController(i);
  controller.addEventListener('selectstart', () => onSelectStart(i));
  controller.addEventListener('selectend',   () => onSelectEnd(i));
  scene.add(controller);

  const grip = renderer.xr.getControllerGrip(i);
  grip.add(controllerModelFactory.createControllerModel(grip));
  scene.add(grip);

  // Pointer ray
  const rayGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -3)
  ]);
  const ray = new THREE.Line(rayGeo, new THREE.LineBasicMaterial({ color: 0xffcc66 }));
  ray.scale.z = 3;
  controller.add(ray);

  controllers.push(controller);
}

const tempMatrix = new THREE.Matrix4();
const raycaster = new THREE.Raycaster();

function getIntersections(controller, objects) {
  tempMatrix.identity().extractRotation(controller.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
  return raycaster.intersectObjects(objects, true);
}

function onSelectStart(i) {
  const controller = controllers[i];

  // 1) Try to grab a grabbable within close range
  const grabHits = getIntersections(controller, grabbables);
  if (grabHits.length && grabHits[0].distance < 0.8) {
    let obj = grabHits[0].object;
    while (obj.parent && !obj.userData.grabbable) obj = obj.parent;
    if (obj.userData.grabbable) {
      controller.attach(obj);
      heldObjects[i] = obj;
      return;
    }
  }

  // 2) Otherwise try to activate a station orb
  const stationHits = getIntersections(controller, interactables);
  if (stationHits.length) {
    const orb = stationHits[0].object;
    if (orb.userData.activate) orb.userData.activate();
  }
}

function onSelectEnd(i) {
  if (heldObjects[i]) {
    scene.attach(heldObjects[i]);
    heldObjects[i] = null;
  }
}

// ---------- Animation loop ----------
const clock = new THREE.Clock();

function spawnVapor() {
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.02, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xddddff, transparent: true, opacity: 0.7 })
  );
  p.position.set(1.2 + (Math.random()-0.5)*0.05, 1.05, -1.2);
  p.userData.vel = 0.005 + Math.random()*0.003;
  p.userData.life = 0;
  scene.add(p);
  vaporParticles.push(p);
}

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // Flame flicker
  flame.scale.set(
    1 + Math.sin(t*15)*0.1,
    1 + Math.sin(t*12)*0.15,
    1 + Math.cos(t*14)*0.1
  );
  fireLight.intensity = 2.2 + Math.sin(t*20)*0.4;

  // Pulse station orbs
  interactables.forEach((orb, i) => {
    const s = 1 + Math.sin(t*3 + i)*0.15;
    orb.scale.set(s, s, s);
  });

  // Distillation vapor
  if (distilling && Math.random() < 0.5) spawnVapor();
  for (let i = vaporParticles.length - 1; i >= 0; i--) {
    const p = vaporParticles[i];
    p.userData.life += dt;
    p.position.y += p.userData.vel;
    p.position.x += Math.sin(p.userData.life*3) * 0.002;
    if (p.position.y > 1.18) {
      // drift down the spout
      p.position.x += 0.003;
      p.position.y -= 0.002;
    }
    p.material.opacity = Math.max(0, 0.7 - p.userData.life * 0.15);
    if (p.userData.life > 4) {
      scene.remove(p);
      vaporParticles.splice(i, 1);
    }
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
